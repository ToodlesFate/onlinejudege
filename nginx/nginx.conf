# =============================================================================
#  OnlineJudge — Frontend nginx
#  依据 SPEC §3.3: 原生 HTML/CSS/JS, History API SPA
#  - 静态文件直接由 nginx 提供
#  - 非 .html / 非静态资源请求 → fallback 到 index.html (SPA 路由)
#  - /api/ 反代到 backend:8080 (同 internal 网络)
#  - 不缓存 HTML, 让前端代码随时生效
# =============================================================================

server {
    listen       80 default_server;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---- 安全响应头 (SPEC §9.3 S-1) ----
    add_header X-Content-Type-Options "nosniff"                  always;
    add_header X-Frame-Options        "SAMEORIGIN"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # CSP: Monaco Editor 来自 jsdelivr CDN, 故 'unsafe-inline' / 'unsafe-eval' 暂保留
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; \
         style-src  'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; \
         font-src   'self' data: https://cdn.jsdelivr.net https://fonts.gstatic.com; \
         img-src    'self' data: https:; \
         connect-src 'self';"   always;

    # ---- 长缓存静态资源 (assets/) ----
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ---- API 反代 ----
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # 提交 / 判题接口允许较长超时
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ---- 不缓存 HTML, 方便 Phase 1 调试 ----
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # ---- SPA fallback (History API 路由) ----
    # 先尝试静态文件, 找不到则 fallback index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 隐藏 nginx 版本 ----
    server_tokens off;
}
